<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Reels</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #000;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }

        .container {
            position: relative;
            height: 100vh;
            width: 100vw;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* ── Upload Screen ── */
        .upload-screen { text-align: center; color: white; padding: 20px; }
        .upload-screen.hidden { display: none; }
        .upload-icon { font-size: 80px; margin-bottom: 16px; }
        .upload-title { font-size: 28px; font-weight: bold; margin-bottom: 8px; }
        .upload-subtitle { font-size: 16px; color: #aaa; margin-bottom: 28px; }

        .btn-upload, .btn-restore {
            color: white;
            border: none;
            padding: 14px 36px;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
            margin: 6px;
            display: inline-block;
        }
        .btn-upload { background: linear-gradient(135deg, #ff006e, #8338ec); }
        .btn-restore { background: linear-gradient(135deg, #00b4d8, #0077b6); }
        .btn-upload:hover, .btn-restore:hover { transform: scale(1.05); }

        /* ── Video Container ── */
        .video-container { position: relative; height: 100%; width: 100%; }
        .video-container.hidden { display: none; }

        video {
            height: 100%;
            width: 100%;
            object-fit: contain;
            background: #000;
            cursor: pointer;
        }

        /* ── Play Overlay ── */
        .play-overlay {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0,0,0,0.3);
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }
        .play-overlay.show { opacity: 1; pointer-events: all; cursor: pointer; }
        .play-button {
            width: 80px; height: 80px;
            border-radius: 50%;
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(10px);
            display: flex; align-items: center; justify-content: center;
        }
        .play-icon {
            width: 0; height: 0;
            border-left: 25px solid white;
            border-top: 15px solid transparent;
            border-bottom: 15px solid transparent;
            margin-left: 5px;
        }

        /* ── Swipe Indicator ── */
        .swipe-indicator {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            color: white; font-size: 48px;
            opacity: 0; transition: opacity 0.3s;
            pointer-events: none; z-index: 20;
        }
        .swipe-indicator.show { opacity: 0.8; }

        /* ── Video Count ── */
        .video-count {
            position: absolute;
            bottom: 90px; left: 20px;
            font-size: 14px; color: #fff;
            background: rgba(0,0,0,0.5);
            padding: 8px 16px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            pointer-events: none;
        }

        /* ── Add Button (top right) ── */
        .btn-add {
            position: absolute;
            top: 20px; right: 20px;
            width: 52px; height: 52px;
            border-radius: 50%;
            background: linear-gradient(135deg, #ff006e, #8338ec);
            border: none; color: white;
            font-size: 28px; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            z-index: 10;
            box-shadow: 0 4px 15px rgba(255,0,110,0.4);
            transition: transform 0.2s;
        }
        .btn-add:hover { transform: scale(1.1); }

        /* ── Backup Progress (top left) ── */
        .backup-progress {
            position: absolute;
            top: 20px; left: 20px;
            z-index: 10;
            background: rgba(0,0,0,0.65);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 10px 16px;
            color: white;
            display: none;
            align-items: center;
            gap: 10px;
            min-width: 190px;
        }
        .backup-progress.show { display: flex; }
        .bp-bar-wrap {
            flex: 1; height: 6px;
            background: rgba(255,255,255,0.2);
            border-radius: 3px; overflow: hidden;
        }
        .bp-bar {
            height: 100%;
            background: linear-gradient(90deg, #00b4d8, #06d6a0);
            border-radius: 3px;
            transition: width 0.3s;
            width: 0%;
        }
        .bp-text { font-size: 13px; white-space: nowrap; font-weight: 600; }

        /* ── Volume Control ── */
        .volume-control {
            position: absolute;
            left: 50%; transform: translateX(-50%);
            bottom: 20px;
            display: flex; align-items: center; gap: 12px;
            z-index: 10;
            background: rgba(0,0,0,0.5);
            padding: 10px 18px;
            border-radius: 50px;
            backdrop-filter: blur(10px);
        }
        .volume-btn {
            width: 38px; height: 38px;
            border-radius: 50%;
            background: rgba(255,255,255,0.2);
            border: none; color: white; font-size: 18px;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: background 0.2s;
        }
        .volume-btn:hover { background: rgba(255,255,255,0.3); }
        .volume-slider {
            -webkit-appearance: none;
            width: 120px; height: 6px;
            background: rgba(255,255,255,0.3);
            border-radius: 3px; outline: none; cursor: pointer;
        }
        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px; height: 16px;
            background: white; border-radius: 50%; cursor: pointer;
        }
        .volume-slider::-moz-range-thumb {
            width: 16px; height: 16px;
            background: white; border-radius: 50%; cursor: pointer; border: none;
        }
        .vol-pct { color: white; font-size: 12px; font-weight: 600; min-width: 35px; }

        /* ── Loading Overlay ── */
        .loading-text {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            color: white; font-size: 16px; z-index: 50;
            background: rgba(0,0,0,0.8);
            padding: 20px 40px; border-radius: 10px;
            display: none;
        }

        /* ── Modal ── */
        .modal {
            position: absolute; inset: 0;
            background: rgba(0,0,0,0.85);
            display: flex; align-items: center; justify-content: center;
            z-index: 100;
            opacity: 0; pointer-events: none;
            transition: opacity 0.3s;
        }
        .modal.show { opacity: 1; pointer-events: all; }
        .modal-content {
            background: #1a1a1a;
            border-radius: 20px; padding: 28px;
            max-width: 500px; width: 90%;
            max-height: 80vh; overflow-y: auto;
        }
        .modal-header {
            display: flex; justify-content: space-between;
            align-items: center; margin-bottom: 20px;
        }
        .modal-title { color: white; font-size: 22px; font-weight: bold; }
        .close-btn {
            background: none; border: none; color: #999;
            font-size: 28px; cursor: pointer;
            width: 36px; height: 36px;
            display: flex; align-items: center; justify-content: center;
        }
        .close-btn:hover { color: white; }

        .modal-btn {
            width: 100%; color: white; border: none;
            padding: 14px; border-radius: 12px;
            font-size: 15px; font-weight: 600;
            cursor: pointer; margin-bottom: 10px;
        }
        .mb-add    { background: linear-gradient(135deg, #ff006e, #8338ec); }
        .mb-backup { background: linear-gradient(135deg, #00b4d8, #0077b6); }
        .mb-restore{ background: linear-gradient(135deg, #06d6a0, #118ab2); }
        .mb-shuffle{ background: #3b82f6; margin-top: 8px; }

        .backup-info {
            background: #2a2a2a; border-radius: 10px;
            padding: 12px 14px; margin-bottom: 16px;
            color: #bbb; font-size: 13px; line-height: 1.7;
        }
        .backup-info strong { color: #00b4d8; display: block; margin-bottom: 4px; }

        .list-title { color: white; font-size: 15px; font-weight: 600; margin-bottom: 10px; }
        .video-item {
            background: #2a2a2a; border-radius: 10px;
            padding: 11px 14px; margin-bottom: 8px;
            display: flex; align-items: center;
        }
        .video-item-name {
            color: white; font-size: 13px;
            flex: 1; overflow: hidden;
            text-overflow: ellipsis; white-space: nowrap;
            margin-right: 8px;
        }
        .delete-btn {
            background: none; border: none;
            color: #ff006e; font-size: 20px; cursor: pointer; padding: 2px 6px;
        }
        .delete-btn:hover { color: #ff4d94; }

        input[type="file"] { display: none; }

        @media (max-width: 768px) {
            .volume-slider { width: 80px; }
            .video-count { bottom: 75px; }
        }
    </style>
</head>
<body>
<div class="container">

    <!-- Upload Screen -->
    <div class="upload-screen" id="uploadScreen">
        <div class="upload-icon">📱</div>
        <div class="upload-title">Video Reels</div>
        <div class="upload-subtitle">Tải video lên để bắt đầu lướt</div>
        <input type="file" id="fileInput" accept="video/*" multiple>
        <button class="btn-upload" onclick="document.getElementById('fileInput').click()">📁 Chọn Video</button>
        <input type="file" id="restoreInput" accept=".zip">
        <button class="btn-restore" onclick="document.getElementById('restoreInput').click()">📥 Khôi phục Backup</button>
    </div>

    <!-- Video Player -->
    <div class="video-container hidden" id="videoContainer">

        <div class="loading-text" id="loadingText">Đang xử lý...</div>

        <video id="videoPlayer"></video>

        <div class="swipe-indicator" id="swipeIndicator"></div>

        <div class="play-overlay" id="playOverlay" onclick="togglePlay()">
            <div class="play-button"><div class="play-icon"></div></div>
        </div>

        <!-- Top left: backup progress -->
        <div class="backup-progress" id="backupProgress">
            <div class="bp-bar-wrap"><div class="bp-bar" id="bpBar"></div></div>
            <div class="bp-text" id="bpText">0%</div>
        </div>

        <!-- Top right: add button -->
        <button class="btn-add" onclick="openModal()">+</button>

        <!-- Bottom center: video count -->
        <div class="video-count" id="videoCount">1 / 1</div>

        <!-- Bottom center: volume -->
        <div class="volume-control">
            <button class="volume-btn" id="volumeBtn" onclick="toggleMute()">🔊</button>
            <input type="range" min="0" max="100" value="100" class="volume-slider" id="volumeSlider">
            <div class="vol-pct" id="volPct">100%</div>
        </div>

    </div>

    <!-- Modal -->
    <div class="modal" id="modal">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-title">Quản lý Video</div>
                <button class="close-btn" onclick="closeModal()">×</button>
            </div>

            <input type="file" id="fileInputModal" accept="video/*" multiple>
            <button class="modal-btn mb-add" onclick="document.getElementById('fileInputModal').click()">➕ Thêm video mới</button>

            <button class="modal-btn mb-backup" onclick="backupVideos()">💾 Backup tất cả video</button>

            <input type="file" id="restoreInputModal" accept=".zip">
            <button class="modal-btn mb-restore" onclick="document.getElementById('restoreInputModal').click()">📥 Khôi phục từ backup</button>

            <div class="backup-info">
                <strong>💡 Backup & Restore</strong>
                • <b>Backup</b>: Tải video về máy dưới dạng .zip<br>
                • <b>Restore</b>: Khôi phục video từ file backup<br>
                • An toàn khi xóa dữ liệu trình duyệt!
            </div>

            <div class="list-title" id="listTitle">Danh sách video (0)</div>
            <div id="videoList"></div>

            <button class="modal-btn mb-shuffle" onclick="shuffleVideos()">🔀 Xáo trộn lại thứ tự</button>
        </div>
    </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script>
    // ── DB ──
    const DB_NAME = 'VideoReelsDB', DB_VER = 1, STORE = 'videos';
    let db = null;

    function initDB() {
        return new Promise((res, rej) => {
            const r = indexedDB.open(DB_NAME, DB_VER);
            r.onerror = () => rej(r.error);
            r.onsuccess = () => { db = r.result; res(db); };
            r.onupgradeneeded = e => {
                const d = e.target.result;
                if (!d.objectStoreNames.contains(STORE))
                    d.createObjectStore(STORE, { keyPath: 'id' });
            };
        });
    }

    function saveToDB(video) {
        return new Promise((res, rej) => {
            const tx = db.transaction([STORE], 'readwrite');
            const req = tx.objectStore(STORE).put(video);
            req.onsuccess = () => res();
            req.onerror = () => rej(req.error);
        });
    }

    function loadFromDB() {
        return new Promise((res, rej) => {
            const tx = db.transaction([STORE], 'readonly');
            const req = tx.objectStore(STORE).getAll();
            req.onsuccess = () => res(req.result.map(v => ({ ...v, url: URL.createObjectURL(v.blob) })));
            req.onerror = () => rej(req.error);
        });
    }

    function deleteFromDB(id) {
        return new Promise((res, rej) => {
            const tx = db.transaction([STORE], 'readwrite');
            const req = tx.objectStore(STORE).delete(id);
            req.onsuccess = () => res();
            req.onerror = () => rej(req.error);
        });
    }

    // ── State ──
    let allVideos = [], shuffled = [], curIdx = 0, playing = false;
    let touchStartY = 0, touchEndY = 0, wheelLock = false;

    // ── DOM ──
    const videoPlayer   = document.getElementById('videoPlayer');
    const uploadScreen  = document.getElementById('uploadScreen');
    const videoContainer= document.getElementById('videoContainer');
    const playOverlay   = document.getElementById('playOverlay');
    const modal         = document.getElementById('modal');
    const videoCount    = document.getElementById('videoCount');
    const volumeSlider  = document.getElementById('volumeSlider');
    const volumeBtn     = document.getElementById('volumeBtn');
    const volPct        = document.getElementById('volPct');
    const swipeInd      = document.getElementById('swipeIndicator');
    const loadingText   = document.getElementById('loadingText');
    const bpWrap        = document.getElementById('backupProgress');
    const bpBar         = document.getElementById('bpBar');
    const bpText        = document.getElementById('bpText');

    // ── Init ──
    async function init() {
        await initDB();
        const saved = await loadFromDB();
        if (saved.length > 0) {
            allVideos = saved;
            doShuffle();
            showPlayer();
            playAt(0);
        }
    }

    function showPlayer() {
        uploadScreen.classList.add('hidden');
        videoContainer.classList.remove('hidden');
    }

    function hidePlayer() {
        videoContainer.classList.add('hidden');
        uploadScreen.classList.remove('hidden');
    }

    // ── File Inputs ──
    document.getElementById('fileInput').addEventListener('change', handleUpload);
    document.getElementById('fileInputModal').addEventListener('change', handleUpload);
    document.getElementById('restoreInput').addEventListener('change', e => { handleRestore(e.target.files[0]); e.target.value = ''; });
    document.getElementById('restoreInputModal').addEventListener('change', e => { handleRestore(e.target.files[0]); e.target.value = ''; });

    async function handleUpload(e) {
        const files = Array.from(e.target.files).filter(f => f.type.startsWith('video/'));
        if (!files.length) { alert('Vui lòng chọn ít nhất một file video!'); return; }

        loadingText.style.display = 'block';
        for (const f of files) {
            const v = { id: Date.now() + Math.random(), name: f.name, blob: f, url: URL.createObjectURL(f) };
            allVideos.push(v);
            await saveToDB(v);
        }
        loadingText.style.display = 'none';

        if (shuffled.length === 0) {
            doShuffle();
            showPlayer();
            playAt(0);
        }
        updateList();
        closeModal();
        e.target.value = '';
    }

    // ── Shuffle ──
    function shuffle(arr) {
        const a = [...arr];
        for (let i = a.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [a[i], a[j]] = [a[j], a[i]];
        }
        return a;
    }

    function doShuffle() {
        shuffled = shuffle(allVideos);
        curIdx = 0;
    }

    function shuffleVideos() {
        doShuffle();
        playAt(0);
        closeModal();
    }

    // ── Playback ──
    function playAt(idx) {
        if (!shuffled.length) return;
        curIdx = idx;
        const v = shuffled[curIdx];
        videoPlayer.src = v.url;
        videoCount.textContent = `${curIdx + 1} / ${shuffled.length}`;
        videoPlayer.play().catch(() => {});
        playing = true;
        playOverlay.classList.remove('show');
    }

    function togglePlay() {
        if (playing) {
            videoPlayer.pause();
            playing = false;
            playOverlay.classList.add('show');
        } else {
            videoPlayer.play().catch(() => {});
            playing = true;
            playOverlay.classList.remove('show');
        }
    }

    function nextVideo() {
        if (!shuffled.length) return;
        playAt((curIdx + 1) % shuffled.length);
    }

    function prevVideo() {
        if (!shuffled.length) return;
        playAt(curIdx === 0 ? shuffled.length - 1 : curIdx - 1);
    }

    // ── Video events ──
    videoPlayer.addEventListener('ended', nextVideo);
    videoPlayer.addEventListener('click', togglePlay);

    // ── Volume ──
    volumeSlider.addEventListener('input', e => {
        const v = e.target.value / 100;
        videoPlayer.volume = v;
        volPct.textContent = e.target.value + '%';
        volumeBtn.textContent = v === 0 ? '🔇' : v < 0.5 ? '🔉' : '🔊';
    });

    function toggleMute() {
        if (videoPlayer.volume > 0) {
            videoPlayer.volume = 0; volumeSlider.value = 0;
            volPct.textContent = '0%'; volumeBtn.textContent = '🔇';
        } else {
            videoPlayer.volume = 1; volumeSlider.value = 100;
            volPct.textContent = '100%'; volumeBtn.textContent = '🔊';
        }
    }

    // ── Touch swipe ──
    videoPlayer.addEventListener('touchstart', e => { touchStartY = e.touches[0].clientY; });
    videoPlayer.addEventListener('touchmove',  e => { touchEndY  = e.touches[0].clientY; });
    videoPlayer.addEventListener('touchend', () => {
        const d = touchStartY - touchEndY;
        if (Math.abs(d) > 50) {
            showSwipe(d > 0 ? '▼' : '▲');
            d > 0 ? nextVideo() : prevVideo();
        }
    });

    // ── Mouse wheel ──
    videoPlayer.addEventListener('wheel', e => {
        e.preventDefault();
        if (wheelLock) return;
        wheelLock = true;
        setTimeout(() => { wheelLock = false; }, 600);
        if (e.deltaY > 0) { showSwipe('▼'); nextVideo(); }
        else               { showSwipe('▲'); prevVideo(); }
    }, { passive: false });

    function showSwipe(icon) {
        swipeInd.textContent = icon;
        swipeInd.classList.add('show');
        setTimeout(() => swipeInd.classList.remove('show'), 300);
    }

    // ── Modal ──
    function openModal()  { modal.classList.add('show'); updateList(); }
    function closeModal() { modal.classList.remove('show'); }

    function updateList() {
        document.getElementById('listTitle').textContent = `Danh sách video (${allVideos.length})`;
        document.getElementById('videoList').innerHTML = allVideos.map(v => `
            <div class="video-item">
                <div class="video-item-name">${v.name}</div>
                <button class="delete-btn" onclick="deleteVideo(${JSON.stringify(v.id)})">×</button>
            </div>
        `).join('');
    }

    async function deleteVideo(id) {
        await deleteFromDB(id);
        allVideos  = allVideos.filter(v => v.id !== id);
        shuffled   = shuffled.filter(v => v.id !== id);
        if (curIdx >= shuffled.length) curIdx = Math.max(0, shuffled.length - 1);
        if (!shuffled.length) { hidePlayer(); closeModal(); }
        else playAt(curIdx);
        updateList();
    }

    // ── Backup ──
    async function backupVideos() {
        if (!allVideos.length) { alert('Không có video nào để backup!'); return; }
        const CHUNK = 10;
        const total = Math.ceil(allVideos.length / CHUNK);
        if (!confirm(`Bạn có ${allVideos.length} video.\nSẽ tạo ${total} file zip.\nTiếp tục?`)) return;

        closeModal();
        bpWrap.classList.add('show');

        function setProgress(videoDone, zipPct) {
            // videoDone: số video đã xong hẳn, zipPct: 0-100 tiến trình nén file hiện tại
            const basePercent = Math.round((videoDone / allVideos.length) * 100);
            const chunkSize   = Math.min(CHUNK, allVideos.length - videoDone);
            const chunkContrib= Math.round((chunkSize / allVideos.length) * zipPct);
            const pct = Math.min(basePercent + chunkContrib, 99);
            bpBar.style.width = pct + '%';
            bpText.textContent = `${videoDone}/${allVideos.length} (${pct}%)`;
        }

        try {
            for (let i = 0; i < total; i++) {
                const start = i * CHUNK;
                const chunk = allVideos.slice(start, start + CHUNK);

                const zip = new JSZip();
                const folder = zip.folder('videos');
                for (const v of chunk) folder.file(v.name, v.blob);

                const blob = await zip.generateAsync(
                    { type: 'blob', compression: 'DEFLATE', compressionOptions: { level: 6 } },
                    ({ percent }) => setProgress(start, percent)   // callback realtime
                );

                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url; a.download = `backup-part${i + 1}-of-${total}.zip`;
                a.click();
                URL.revokeObjectURL(url);

                // Cập nhật sau khi xong chunk này
                setProgress(start + chunk.length, 100);
                await new Promise(r => setTimeout(r, 1200));
            }

            bpBar.style.width = '100%';
            bpText.textContent = `${allVideos.length}/${allVideos.length} ✅`;
            setTimeout(() => { bpWrap.classList.remove('show'); bpBar.style.width = '0%'; }, 3500);
            alert(`✅ Backup xong ${allVideos.length} video (${total} file)!`);
        } catch (err) {
            bpWrap.classList.remove('show');
            alert('❌ Lỗi backup: ' + err.message);
        }
    }

    // ── Restore ──
    async function handleRestore(file) {
        if (!file) return;
        loadingText.style.display = 'block';
        loadingText.textContent = 'Đang khôi phục...';
        try {
            const zip = await new JSZip().loadAsync(file);
            const entries = Object.entries(zip.files).filter(([n, f]) => !f.dir && n.startsWith('videos/'));
            if (!entries.length) throw new Error('Không tìm thấy video trong file backup!');

            for (const [filename, fileData] of entries) {
                const blob = await fileData.async('blob');
                const name = filename.replace('videos/', '');
                const v = { id: Date.now() + Math.random(), name, blob, url: URL.createObjectURL(blob) };
                allVideos.push(v);
                await saveToDB(v);
            }

            loadingText.style.display = 'none';
            if (shuffled.length === 0) { doShuffle(); showPlayer(); playAt(0); }
            updateList(); closeModal();
            alert(`✅ Đã khôi phục ${entries.length} video!`);
        } catch (err) {
            loadingText.style.display = 'none';
            alert('❌ Lỗi restore: ' + err.message);
        }
    }

    init();
</script>
</body>
</html>
